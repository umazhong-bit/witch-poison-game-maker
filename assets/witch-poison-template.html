<div id="witch-pixel-game">
  <style>
    #witch-pixel-game {
      --ink:#2a1822; --night:#161321; --night-2:#21172b; --stone:#34243c;
      --purple:#78348b; --purple-hi:#b85bca; --green:#5f9b33; --green-hi:#a7d65d;
      --gold:#e7a634; --paper:#f3d29a; --paper-2:#dba768; --wood:#6b351e;
      --red:#b73d52; --blue:#3c7fa8; --cream:#fff1c8;
      position:relative; overflow:hidden; width:100%; min-height:calc(100vh - 28px); padding:18px; border-radius:22px;
      color:var(--cream); font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
      background:
        radial-gradient(circle at 50% -15%, rgba(122,64,151,.42), transparent 38%),
        linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px),
        var(--night);
      background-size:auto,32px 22px,32px 22px,auto;
      box-shadow:inset 0 0 90px rgba(0,0,0,.52),0 18px 60px rgba(0,0,0,.25);
    }
    #witch-pixel-game::before,#witch-pixel-game::after{content:"";position:absolute;top:54px;width:70px;height:160px;opacity:.55;background:repeating-linear-gradient(0deg,#492d3e 0 18px,#241827 19px 22px);border:6px solid #1c131e;border-radius:8px;z-index:0}
    #witch-pixel-game::before{left:-22px} #witch-pixel-game::after{right:-22px}
    #witch-pixel-game .game-shell{position:relative;z-index:1;max-width:1020px;margin:auto}
    #witch-pixel-game.presentation,#witch-pixel-game:fullscreen{position:fixed;inset:0;z-index:2147483647;width:100vw;height:100dvh;min-height:100dvh;padding:clamp(8px,1.35vw,20px);border-radius:0}
    #witch-pixel-game.presentation .game-shell,#witch-pixel-game:fullscreen .game-shell{display:grid;grid-template-rows:auto auto minmax(0,1fr) auto auto;width:100%;height:100%;max-width:min(1600px,100%);margin:auto}
    #witch-pixel-game.presentation .title-sign,#witch-pixel-game:fullscreen .title-sign{margin-bottom:clamp(5px,.8vh,10px);padding:clamp(4px,.65vh,8px) 28px clamp(5px,.8vh,9px)}
    #witch-pixel-game.presentation .title-sign span,#witch-pixel-game:fullscreen .title-sign span{font-size:clamp(11px,1.4vh,16px)}
    #witch-pixel-game.presentation .hud,#witch-pixel-game:fullscreen .hud{margin-bottom:clamp(5px,.8vh,10px);gap:clamp(7px,1vw,14px)}
    #witch-pixel-game.presentation .team,#witch-pixel-game:fullscreen .team{padding:clamp(5px,.8vh,10px) 14px}
    #witch-pixel-game.presentation .potion,#witch-pixel-game:fullscreen .potion{width:clamp(34px,4.6vh,50px);height:clamp(40px,5.5vh,59px)}
    #witch-pixel-game.presentation .board-frame,#witch-pixel-game:fullscreen .board-frame{min-height:0;padding:clamp(8px,1.25vh,16px)}
    #witch-pixel-game.presentation .board,#witch-pixel-game:fullscreen .board{grid-template-rows:repeat(5,minmax(0,1fr));height:100%;gap:clamp(5px,.85vh,10px)}
    #witch-pixel-game.presentation .tile,#witch-pixel-game:fullscreen .tile{min-height:0;padding:3px 5px}
    #witch-pixel-game.presentation .word,#witch-pixel-game:fullscreen .word{min-height:0;height:100%;font-size:clamp(18px,min(2.15vw,3.45vh),38px)}
    #witch-pixel-game.presentation .result,#witch-pixel-game:fullscreen .result{font-size:clamp(18px,min(1.8vw,3vh),31px)}
    #witch-pixel-game.presentation .status,#witch-pixel-game:fullscreen .status{min-height:20px;margin:clamp(4px,.65vh,8px) 0 0}
    #witch-pixel-game.presentation .teacher-bar,#witch-pixel-game:fullscreen .teacher-bar{margin-top:clamp(4px,.65vh,8px)}
    #witch-pixel-game.presentation .game-btn,#witch-pixel-game:fullscreen .game-btn{padding:clamp(6px,.85vh,10px) clamp(11px,1.15vw,17px)}
    #witch-pixel-game .title-sign{position:relative;width:min(470px,76%);margin:0 auto 14px;padding:10px 28px 13px;text-align:center;color:#4b213d;background:linear-gradient(#f6dca9,#dda866);border:5px solid #5a2d1e;border-radius:10px;box-shadow:0 5px 0 #271621,inset 0 0 0 3px #b9753e}
    #witch-pixel-game .title-sign::before,#witch-pixel-game .title-sign::after{content:"";position:absolute;top:10px;width:22px;height:22px;border-radius:50%;background:#8e5f32;box-shadow:inset 0 0 0 5px #5b3525}
    #witch-pixel-game .title-sign::before{left:9px} #witch-pixel-game .title-sign::after{right:9px}
    #witch-pixel-game .title-sign b{display:block;letter-spacing:2px;text-shadow:0 2px #fff1c8}
    #witch-pixel-game .title-sign span{display:block;color:#6d2f77;margin-top:2px}
    #witch-pixel-game .hud{display:grid;grid-template-columns:1fr minmax(180px,.72fr) 1fr;gap:12px;align-items:stretch;margin-bottom:12px}
    #witch-pixel-game .team{position:relative;display:flex;align-items:center;gap:11px;padding:10px 14px;background:linear-gradient(#3b2944,#241a2c);border:4px solid #18111d;border-radius:12px;box-shadow:inset 0 0 0 2px #5b3f60,0 5px 0 #0f0b13}
    #witch-pixel-game .team.b{justify-content:flex-end;text-align:right}
    #witch-pixel-game .team.a::before,#witch-pixel-game .team.b::before{content:"";position:absolute;inset:4px;border-radius:6px;pointer-events:none}
    #witch-pixel-game .team.a::before{border-left:5px solid var(--blue)} #witch-pixel-game .team.b::before{border-right:5px solid var(--red)}
    #witch-pixel-game .team-label{min-width:52px} #witch-pixel-game .team-label b{display:block;color:var(--cream)} #witch-pixel-game .team-label span{color:#b8a5bf}
    #witch-pixel-game .potions{display:flex;gap:4px;align-items:center}
    #witch-pixel-game .potion{display:block;width:46px;height:54px;overflow:hidden;border-radius:9px;transition:.25s;filter:drop-shadow(0 4px 0 #130e18)}
    #witch-pixel-game .potion img{display:block;width:100%;height:100%;object-fit:cover;object-position:center}
    #witch-pixel-game .potion.lost{opacity:.16;filter:grayscale(1) drop-shadow(0 3px 0 #130e18);transform:translateY(4px) rotate(10deg)}
    #witch-pixel-game .turn{display:grid;place-items:center;text-align:center;padding:8px 12px;color:#3d2432;background:linear-gradient(#f3d9a8,#d7a05f);border:4px solid #60331e;border-radius:10px;box-shadow:inset 0 0 0 2px #ffebbd,0 5px #21141a}
    #witch-pixel-game .turn b{display:block;color:#6d2b78} #witch-pixel-game .turn span{display:block;margin-top:3px}
    #witch-pixel-game .board-frame{position:relative;padding:17px;background:linear-gradient(135deg,#754124,#452418);border:5px solid #21141a;border-radius:15px;box-shadow:inset 0 0 0 3px #a66532,0 9px 0 #100b10}
    #witch-pixel-game .board-frame::before{content:"";position:absolute;inset:8px;border:2px dashed rgba(255,214,143,.18);border-radius:7px;pointer-events:none}
    #witch-pixel-game .board{position:relative;display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:9px;padding:3px}
    #witch-pixel-game .tile{position:relative;min-width:0;min-height:86px;padding:7px 5px;color:#3b2520;font:inherit;border:3px solid #7b472b;border-radius:7px;background:linear-gradient(#f7deb0,#dda86b);box-shadow:inset 0 0 0 2px #fff0c6,0 5px 0 #3d241c;cursor:pointer;transition:transform .12s,filter .12s}
    #witch-pixel-game .tile:hover:not(:disabled){filter:brightness(1.08);transform:translateY(-2px)}
    #witch-pixel-game .tile.selected{color:#fff6d5;background:linear-gradient(#9c4cad,#5e276f);border-color:#32173d;box-shadow:inset 0 0 0 2px #ca76d5,0 6px 0 #211128;transform:translateY(-3px)}
    #witch-pixel-game .tile.setup{color:#fff6d5;background:linear-gradient(#759f3e,#3e6729);border-color:#29451e;box-shadow:inset 0 0 0 2px #b4d96d,0 5px #203117}
    #witch-pixel-game .tile.blocked{opacity:.28;filter:grayscale(1);cursor:not-allowed}
    #witch-pixel-game .tile.eaten{cursor:default;overflow:hidden}#witch-pixel-game .tile.safe{background:linear-gradient(#98c955,#4d7d2e);color:#fff;border-color:#385f27;box-shadow:inset 0 0 0 2px #c9ed8b,0 5px 0 #263d1d}#witch-pixel-game .tile.poison{background:linear-gradient(#ad4b8b,#682766);color:#fff;border-color:#421b48;box-shadow:inset 0 0 0 2px #d582bd,0 5px 0 #351735}
    #witch-pixel-game .num{position:absolute;left:5px;top:3px;opacity:.45;font-size:11px}
    #witch-pixel-game .word{display:flex;align-items:center;justify-content:center;width:100%;min-height:68px;font-family:ui-rounded,"Arial Rounded MT Bold",Arial,sans-serif;font-size:clamp(17px,2.25vw,29px);font-weight:900;line-height:1.02;letter-spacing:.2px;word-break:normal;overflow-wrap:anywhere;text-shadow:0 1px rgba(255,255,255,.55)}
    #witch-pixel-game .result{position:absolute;inset:4px;z-index:2;display:grid;place-items:center;margin:0;border-radius:5px;opacity:0;color:#fff;font-family:ui-rounded,"Arial Rounded MT Bold",Arial,sans-serif;font-size:clamp(17px,1.75vw,26px);font-weight:900;letter-spacing:.5px;text-align:center;text-shadow:0 3px 0 rgba(38,19,32,.45);pointer-events:none}
    #witch-pixel-game .result:not(:empty){opacity:1}
    #witch-pixel-game .tile.eaten .word{visibility:hidden}
    #witch-pixel-game .tile.eaten .num{z-index:3;color:#fff;opacity:.65}
    #witch-pixel-game .teacher-bar{display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:9px;margin-top:14px}
    #witch-pixel-game .game-btn{font:inherit;color:#fff1c8;padding:9px 15px;border:3px solid #21141a;border-radius:9px;background:linear-gradient(#70407f,#472350);box-shadow:inset 0 0 0 2px #9662a1,0 5px #120c14;cursor:pointer}
    #witch-pixel-game .game-btn:hover{filter:brightness(1.12);transform:translateY(-1px)}
    #witch-pixel-game .game-btn.primary{background:linear-gradient(#7daf43,#47752d);box-shadow:inset 0 0 0 2px #a9d86c,0 5px #1d2e19}
    #witch-pixel-game .game-btn.wrong{background:linear-gradient(#ca5a62,#88323f);box-shadow:inset 0 0 0 2px #e98a87,0 5px #371720}
    #witch-pixel-game .status{min-height:24px;margin:12px 0 0;text-align:center;color:#e7c887}
    #witch-pixel-game .overlay{position:absolute;inset:0;z-index:20;display:grid;place-items:center;padding:20px;background:rgba(12,8,16,.82);backdrop-filter:blur(5px)}
    #witch-pixel-game .overlay[hidden]{display:none}
    #witch-pixel-game .dialog{position:relative;max-width:540px;width:100%;padding:28px 28px 25px;text-align:center;color:#43271f;background:linear-gradient(#f6ddb0,#dba263);border:6px solid #5a2d1e;border-radius:12px;box-shadow:inset 0 0 0 3px #fff0c2,0 12px 0 #1a1018,0 25px 70px #000}
    #witch-pixel-game .dialog::before{content:"🧙‍♀️";position:absolute;left:-26px;bottom:-8px;font-size:64px;filter:drop-shadow(0 5px #261525)}
    #witch-pixel-game .dialog h2{margin:0 0 8px;color:#6a2876;text-shadow:0 2px #fff1c8}#witch-pixel-game .dialog p{margin:0 0 18px}
    #witch-pixel-game .burst{position:absolute;inset:0;z-index:12;display:grid;place-items:center;pointer-events:none;opacity:0}.burst.show{animation:pop .9s ease both}.burst-card{padding:18px 28px;color:#fff1c8;background:linear-gradient(#723181,#3d1c49);border:5px solid #25132c;border-radius:12px;box-shadow:inset 0 0 0 2px #a75ab5,0 10px 35px #000}
    @keyframes pop{0%{opacity:0;transform:scale(.5) rotate(-4deg)}25%{opacity:1;transform:scale(1.08) rotate(2deg)}70%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.92)}}
    @media(max-width:700px){#witch-pixel-game{padding:10px}#witch-pixel-game .title-sign{width:auto}#witch-pixel-game .hud{grid-template-columns:1fr 1fr}#witch-pixel-game .turn{grid-column:1/-1;grid-row:1}#witch-pixel-game .team{grid-row:2;padding:8px}#witch-pixel-game .board-frame{padding:9px}#witch-pixel-game .board{gap:5px}#witch-pixel-game .tile{min-height:68px;padding:5px 2px}#witch-pixel-game .word{min-height:54px;font-size:clamp(12px,3.8vw,18px)}#witch-pixel-game .potion{width:32px;height:38px}}
    @media(prefers-reduced-motion:reduce){#witch-pixel-game *{animation-duration:.01ms!important;transition-duration:.01ms!important}}
  </style>

  <div class="game-shell">
    <div class="title-sign"><b>女巫的毒药</b><span>WORD POTION</span></div>
    <header class="hud">
      <section class="team a"><div class="team-label"><b>A组</b><span>BLUE</span></div><div class="potions" id="potions-a"></div></section>
      <div class="turn"><b id="turn-title">魔法准备中</b><span id="turn-subtitle">两组各藏3瓶毒药</span></div>
      <section class="team b"><div class="potions" id="potions-b"></div><div class="team-label"><b>B组</b><span>RED</span></div></section>
    </header>

    <main class="board-frame"><div class="board" id="pixel-board" role="grid" aria-label="词汇卡片棋盘"></div><div class="burst" id="burst"><div class="burst-card"><h2 id="burst-text">SAFE!</h2></div></div></main>
    <p class="status" id="status">点击开始，进入魔法实验室</p>
    <div class="teacher-bar">
      <button type="button" class="game-btn wrong" id="wrong" hidden>↻ 读错了，换一张</button>
      <button type="button" class="game-btn" id="reveal" hidden>◉ 显示毒药</button>
      <button type="button" class="game-btn" id="full">⛶ 全屏显示</button>
      <button type="button" class="game-btn" id="restart">↶ 重新开始</button>
    </div>
  </div>

  <div class="overlay" id="overlay"><div class="dialog"><h2 id="dialog-title">女巫的毒药</h2><p id="dialog-copy">两组轮流认读单词。读对才能吃，谁先喝下3瓶毒药就输掉挑战！</p><button type="button" class="game-btn primary" id="dialog-main">全屏并开始</button></div></div>

      function draw(){board.innerHTML=cards.map(c=>{const poison=poisonA.has(c.id)||poisonB.has(c.id);let cls='tile';if(setup.has(c.id))cls+=' setup';if(selected===c.id)cls+=' selected';if(blocked.has(c.id))cls+=' blocked';if(c.eaten)cls+=` eaten ${c.result}`;const res=c.eaten?(c.result==='poison'?'☠ 毒药':'✓ SAFE'):(showPoison&&poison?'🧪':'');return `<button type="button" class="${cls}" data-id="${c.id}" ${c.eaten||blocked.has(c.id)?'disabled':''} aria-pressed="${selected===c.id}"><span class="num">${c.id+1}</span><b class="word">${c.eaten?'':c.word}</b><span class="result">${res}</span></button>`}).join('')}
      function turnUI(){if(phase!=='play')return;turnTitle.textContent=`${turn}组回合`;turnSubtitle.textContent=selected===null?'先选一张，再大声认读':'读对后，再点一次吃掉';status.textContent=selected===null?`${turn}组请选择一张卡片`:`正在挑战：${cards[selected].word}`;wrong.hidden=selected===null}
      function modal(title,copy,label,fn){dialogTitle.textContent=title;dialogCopy.textContent=copy;dialogMain.textContent=label;dialogMain.onclick=fn;overlay.hidden=false}
      function setupA(){phase='setupA';setup.clear();overlay.hidden=true;turnTitle.textContent='A组设置毒药';turnSubtitle.textContent='B组请闭眼';status.textContent='A组选出3张毒药（0/3）';draw()}
      function setupB(){phase='setupB';setup.clear();overlay.hidden=true;turnTitle.textContent='B组设置毒药';turnSubtitle.textContent='A组请闭眼';status.textContent='B组选出3张毒药（0/3）';draw()}
      function confirmSetup(){if(phase==='setupA'){poisonA=new Set(setup);setup.clear();draw();modal('A组设置完成','A组请闭眼，轮到B组秘密选择3张毒药卡。','B组开始设置',setupB);return}if([...setup].some(x=>poisonA.has(x))){overlay.hidden=true;setup.clear();draw();status.textContent='两组选择有重合，请B组重新选择3张';return}poisonB=new Set(setup);setup.clear();draw();modal('毒药已经藏好','所有人睁开眼睛！A组先开始：先选卡、再认读，读对才能吃。','开始游戏',play)}
      function play(){phase='play';turn='A';selected=null;blocked.clear();overlay.hidden=true;revealBtn.hidden=false;draw();turnUI()}
      function tone(kind){try{const C=window.AudioContext||window.webkitAudioContext;if(!C)return;const c=new C,o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=kind==='poison'?'sawtooth':'sine';o.frequency.setValueAtTime(kind==='poison'?170:520,c.currentTime);o.frequency.exponentialRampToValueAtTime(kind==='poison'?70:780,c.currentTime+.25);g.gain.setValueAtTime(.12,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.34);o.start();o.stop(c.currentTime+.35)}catch(_){}}
      function pop(kind){burstText.textContent=kind==='poison'?'🧪 糟糕，是毒药！':'✨ SAFE！安全吃掉';burst.classList.remove('show');void burst.offsetWidth;burst.classList.add('show');tone(kind)}
      function eat(id){const c=cards[id],poison=poisonA.has(id)||poisonB.has(id);c.eaten=true;c.result=poison?'poison':'safe';selected=null;blocked.clear();if(poison)hp[turn]--;life();draw();pop(c.result);if(hp[turn]===0){const loser=turn,winner=turn==='A'?'B':'A';phase='ended';wrong.hidden=true;setTimeout(()=>modal(`${winner}组获胜！`,`${loser}组喝下了3瓶毒药。换一盘再来挑战吧！`,'重新挑战',reset),720);return}turn=turn==='A'?'B':'A';setTimeout(turnUI,480)}
      board.addEventListener('click',e=>{const btn=e.target.closest('.tile');if(!btn)return;const id=Number(btn.dataset.id);if(phase==='setupA'||phase==='setupB'){if(setup.has(id))setup.delete(id);else if(setup.size<3)setup.add(id);draw();status.textContent=`${phase==='setupA'?'A':'B'}组选出3张毒药（${setup.size}/3）`;if(setup.size===3)setTimeout(()=>modal('确认这3张毒药？','确认后选择会被隐藏，再请另一组上前。','确认并隐藏',confirmSetup),150);return}if(phase!=='play'||cards[id].eaten||blocked.has(id))return;if(selected===id)eat(id);else{selected=id;draw();turnUI()}});
      wrong.addEventListener('click',()=>{if(selected===null)return;const w=cards[selected].word;blocked.add(selected);selected=null;draw();turnUI();status.textContent=`一起学习“${w}”，${turn}组必须换另一张`});
      revealBtn.addEventListener('click',()=>{showPoison=!showPoison;revealBtn.textContent=showPoison?'◉ 隐藏毒药':'◉ 显示毒药';draw()});
      const fullBtn=root.querySelector('#full');
      async function requestPresentation(next){
        root.classList.add('presentation');
        let entered=false;
        try{
          if(!document.fullscreenElement&&root.requestFullscreen){
            await root.requestFullscreen({navigationUI:'hide'});
            entered=true;
          }
        }catch(_){}
        next?.();
        if(!entered&&!document.fullscreenElement){
          status.textContent='已铺满当前窗口；如仍显示浏览器栏，请按 F11';
        }
        updateFullButton();
      }
      async function togglePresentation(){
        if(document.fullscreenElement){
          try{await document.exitFullscreen?.()}catch(_){}
          root.classList.remove('presentation');
        }else if(root.classList.contains('presentation')){
          root.classList.remove('presentation');
        }else{
          await requestPresentation();
        }
        updateFullButton();
      }
      function updateFullButton(){fullBtn.textContent=document.fullscreenElement||root.classList.contains('presentation')?'⛶ 退出全屏':'⛶ 全屏显示'}
      document.addEventListener('fullscreenchange',()=>{if(document.fullscreenElement)root.classList.add('presentation');else root.classList.remove('presentation');updateFullButton()});
      root.querySelector('#restart').addEventListener('click',reset);fullBtn.addEventListener('click',togglePresentation);
      function reset(){cards=makeCards();phase='welcome';setup.clear();poisonA.clear();poisonB.clear();turn='A';hp={A:3,B:3};selected=null;blocked.clear();showPoison=false;wrong.hidden=true;revealBtn.hidden=true;turnTitle.textContent='魔法准备中';turnSubtitle.textContent='两组各藏3瓶毒药';status.textContent='点击全屏开始，进入魔法实验室';modal('女巫的毒药','适配教室横屏一体机。点击后进入全屏，再由两组轮流认读单词。','全屏并开始',()=>requestPresentation(setupA));life();draw();updateFullButton()}
      reset();
    })();
  </script>
